<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Bruh, Page Not Found | YesHello.lol</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👋</text></svg>" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Poppins:wght@700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f8f8f8;
        --card-bg: #ffffff;
        --text: #333;
        --accent: #ff9900;
        --muted: #666;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --card-bg: #1e1e1e;
          --text: #e0e0e0;
          --accent: #ff9900;
          --muted: #aaa;
        }
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }

      .error-container {
        background-color: var(--card-bg);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        padding: 60px 40px;
        max-width: 500px;
        width: 100%;
      }

      .error-code {
        font-family: 'Poppins', sans-serif;
        font-size: 6rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 10px;
      }

      .error-title {
        font-family: 'Poppins', sans-serif;
        font-size: 1.5rem;
        margin-bottom: 16px;
      }

      .error-message {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .home-link {
        display: inline-block;
        background-color: var(--accent);
        color: white;
        padding: 12px 28px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 700;
        transition: background-color 0.3s ease;
      }

      .home-link:hover {
        background-color: #e68a00;
      }

      @media (max-width: 480px) {
        .error-container { padding: 40px 24px; }
        .error-code { font-size: 4rem; }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Bruh, Page Not Found 💀</h1>
      <p class="error-message">
        This page said "Hello" and then ghosted. Nobody asked for this URL, bestie.
        That's lowkey sus.
      </p>
      <a href="/" class="home-link">Take Me Home</a>
    </div>
  </body>
</html>
